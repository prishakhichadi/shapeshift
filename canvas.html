<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web based drawing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toolbar">
        <div class="tool-group">
            <button id="clear">Clear</button>
        </div>

        <div class="tool-group">
            <label for="colorPicker">Color</label>
            <input type="color" id="colorPicker" value="#355872">
            <label for="lineWidth">Size</label>
            <input type="range" id="lineWidth" min="1" max="25" value="5">
        </div>

        <div class="tool-group">
            <label for="opacity">Opacity:</label>
            <input type="range" id="opacity" min="0" max="100" value="100">
        </div>

        <div class="tool-group">
            <label class="toggle-box">
                <input type="checkbox" id="checkbox">
                <div class="circle"></div>
            </label>
        </div>

    </div>

    <div id="sidebar">

        <div class="sidebar-group">
            <button class="tool-btn active" data-shape="solid">🖌️</button>
            <button class="tool-btn" data-shape="dashed">🖌️</button>
            <button class="tool-btn" data-shape="dotted">🖌️</button>
        </div>

        <div class="sidebar-group">
            <button class="tool-btn active" data-shape="square">▢</button>
            <button class="tool-btn" data-shape="rect">▢</button>
            <button class="tool-btn" data-shape="circle">○</button>
            <button class="tool-btn" data-shape="triangle">△</button>
        </div>

        <div class="sidebar-last-group">
            <button class="tool-btn active" data-shape="select">🖌️</button>
            <button class="tool-btn" data-shape="image">▢</button>
            <button class="tool-btn" data-shape="text box">○</button>
        </div>
      
    </div>

    <canvas id="canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
