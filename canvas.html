<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web based drawing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toolbar">
        <div class="tool-group">
            <button id="clear">Clear</button>
            <button id="saveBtn" >Save</button>
        </div>

        <div class="tool-group">
            <label for="colorPicker">Color</label>
            <input type="color" id="colorPicker" value="#355872">
            <label for="lineWidth">Size</label>
            <input type="range" id="lineWidth" min="1" max="25" value="5">
        </div>

        <div class="tool-group">
            <label for="opacity">Opacity:</label>
            <input type="range" id="opacity" min="0" max="100" value="100">
        </div>

        <div class="tool-group">
            <label class="toggle-box">
                <input type="checkbox" id="checkbox">
                <div class="circle"></div>
            </label>
        </div>

    
    </div>

    <div id="sidebar">

        <div class="sidebar-group">
            <button class="tool-btn-active" data-shape="solid">
                <img src="https://cdn-icons-png.flaticon.com/128/815/815497.png" class="sidebar-icon">
            </button>
            <button class="tool-btn" data-shape="dashed">
                <img src="https://cdn-icons-png.flaticon.com/128/12363/12363580.png" class="sidebar-icon">
            </button>
            <button class="tool-btn" data-shape="dotted">
                <img src="https://cdn-icons-png.flaticon.com/128/11067/11067272.png" class="sidebar-icon">
            </button>
        </div>

        <div class="sidebar-group">
            <button class="tool-btn" data-shape="square">
                <img src="https://cdn-icons-png.flaticon.com/128/2627/2627937.png" class="sidebar-icon">
                
            </button>
            <button class="tool-btn" data-shape="rect">
                <img src="https://cdn-icons-png.flaticon.com/128/3305/3305372.png" class="sidebar-icon">
            </button>

            <button class="tool-btn" data-shape="circle">
                <img src="https://cdn-icons-png.flaticon.com/128/481/481078.png" class="sidebar-icon">
            </button>
            <button class="tool-btn" data-shape="triangle">
                <img src="https://cdn-icons-png.flaticon.com/128/649/649738.png" class="sidebar-icon">
            </button>
        </div>

        <div class="sidebar-group">
            <button class="tool-btn" data-shape="select">
                <img src="https://cdn-icons-png.flaticon.com/128/2767/2767163.png" class="sidebar-icon">
            </button>
            <button class="tool-btn" data-shape="image">
                <img src="https://cdn-icons-png.flaticon.com/128/739/739249.png" class="sidebar-icon">
            </button>
            <button class="tool-btn" data-shape="text box">
                <img src="https://cdn-icons-png.flaticon.com/128/3856/3856192.png" class="sidebar-icon">
               
            </button>
            <button class="tool-btn" data-shape="eraser">
                <img src="https://cdn-icons-png.flaticon.com/128/4043/4043845.png" class="sidebar-icon">
               
            </button>
        </div>
      
    </div>
    <canvas id="canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
